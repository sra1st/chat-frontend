<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, Helvetica, Arial, sans-serif;
      background: #1a1a2e;
      color: #ffffff;
      height: 100%;
      overflow: hidden;
    }

    html {
      height: 100%;
    }

    #app {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      height: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    #header {
      background: #16213e;
      padding: 14px 16px;
      text-align: center;
      border-bottom: 1px solid #0f3460;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
    }

    #header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e94560;
    }

    #status {
      font-size: 12px;
      margin-top: 4px;
      color: #888;
    }

    #status.connected {
      color: #4caf50;
    }

    #status.disconnected {
      color: #e94560;
    }

    #messages {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      margin-bottom: 12px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .message.sent {
      margin-left: auto;
      text-align: right;
    }

    .message.received {
      margin-right: auto;
      text-align: left;
    }

    .bubble {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
    }

    .sent .bubble {
      background: #e94560;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .received .bubble {
      background: #16213e;
      color: #fff;
      border-bottom-left-radius: 4px;
    }

    .message .time {
      font-size: 10px;
      color: #666;
      margin-top: 3px;
    }

    .system-msg {
      text-align: center;
      font-size: 12px;
      color: #666;
      margin: 8px 0;
    }

    #input-area {
      background: #16213e;
      padding: 10px 12px;
      border-top: 1px solid #0f3460;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      gap: 8px;
    }

    #msg-input {
      -webkit-box-flex: 1;
      -webkit-flex: 1;
      flex: 1;
      background: #0f3460;
      border: none;
      border-radius: 20px;
      padding: 10px 16px;
      color: #fff;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
    }

    #msg-input::-webkit-input-placeholder {
      color: #666;
    }

    #send-btn {
      background: #e94560;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      -webkit-appearance: none;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
    }

    #send-btn:active {
      opacity: 0.7;
    }

    #name-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1a1a2e;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 32px;
      z-index: 100;
    }

    #name-screen h2 {
      font-size: 24px;
      color: #e94560;
      margin-bottom: 8px;
    }

    #name-screen p {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      text-align: center;
    }

    #name-input {
      width: 100%;
      max-width: 300px;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-size: 16px;
      outline: none;
      -webkit-appearance: none;
      margin-bottom: 16px;
      text-align: center;
    }

    #name-input:focus {
      border-color: #e94560;
    }

    #join-btn {
      width: 100%;
      max-width: 300px;
      background: #e94560;
      border: none;
      border-radius: 12px;
      padding: 14px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
    }

    #join-btn:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <!-- Name Screen -->
  <div id="name-screen">
    <h2>💬 Chat</h2>
    <p>Enter your name to start chatting</p>
    <input type="text" id="name-input" placeholder="Your name" maxlength="20">
    <button id="join-btn">Join Chat</button>
  </div>

  <!-- Chat App -->
  <div id="app">
    <div id="header">
      <h1>💬 Chat</h1>
      <div id="status" class="disconnected">Connecting...</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="Type a message..." maxlength="500">
      <button id="send-btn">&#9658;</button>
    </div>
  </div>

  <script>
    // REPLACE THIS WITH YOUR RAILWAY URL AFTER DEPLOYMENT
    var WS_URL = 'wss://chat-backend-2ri0.onrender.com';

    var userName = '';
    var ws = null;
    var messagesDiv = document.getElementById('messages');
    var statusDiv = document.getElementById('status');
    var msgInput = document.getElementById('msg-input');

    // Join button
    document.getElementById('join-btn').addEventListener('click', function() {
      var name = document.getElementById('name-input').value.trim();
      if (!name) {
        alert('Please enter your name');
        return;
      }
      userName = name;
      document.getElementById('name-screen').style.display = 'none';
      connectWebSocket();
    });

    // Allow enter key on name input
    document.getElementById('name-input').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) {
        document.getElementById('join-btn').click();
      }
    });

    function connectWebSocket() {
      ws = new WebSocket(WS_URL);

      ws.onopen = function() {
        statusDiv.textContent = 'Connected as ' + userName;
        statusDiv.className = 'connected';
        addSystemMessage('You joined the chat');
      };

      ws.onmessage = function(event) {
        var data = JSON.parse(event.data);
        addMessage(data.name, data.text, false);
      };

      ws.onclose = function() {
        statusDiv.textContent = 'Disconnected — tap to reconnect';
        statusDiv.className = 'disconnected';
        addSystemMessage('Connection lost. Reconnecting...');
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = function() {
        statusDiv.textContent = 'Connection error';
        statusDiv.className = 'disconnected';
      };
    }

    function sendMessage() {
      var text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;

      var data = { name: userName, text: text };
      ws.send(JSON.stringify(data));
      addMessage(userName, text, true);
      msgInput.value = '';
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);

    msgInput.addEventListener('keydown', function(e) {
      if (e.keyCode === 13) sendMessage();
    });

    function addMessage(name, text, isSent) {
      var now = new Date();
      var time = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();

      var div = document.createElement('div');
      div.className = 'message ' + (isSent ? 'sent' : 'received');
      div.innerHTML =
        '<div class="bubble">' +
          (isSent ? '' : '<strong>' + escapeHtml(name) + '</strong><br>') +
          escapeHtml(text) +
        '</div>' +
        '<div class="time">' + time + '</div>';

      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addSystemMessage(text) {
      var div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
