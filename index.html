<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐰💬</title>
  <meta property="og:title" content="bunnychat 🐰💬">
  <meta property="og:description" content="for paranoid bunnies to discuss their secret carrot stash">
  <meta property="og:url" content="https://bunnychat.netlify.app">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://bunnychat.netlify.app/preview.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #c97ee8; color: #fff; }

    #stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 101; overflow: hidden; }
    .star { position: absolute; color: rgba(255,255,255,0.95); -webkit-animation: twinkle 2s infinite; animation: twinkle 2s infinite; }
    @-webkit-keyframes twinkle { 0%,100%{opacity:0.08;-webkit-transform:scale(0.7)} 50%{opacity:1;-webkit-transform:scale(1.6)} }
    @keyframes twinkle { 0%,100%{opacity:0.08;transform:scale(0.7)} 50%{opacity:1;transform:scale(1.6)} }

    /* HOME SCREEN */
    #name-screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #c97ee8;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 32px 24px; z-index: 100;
    }
    #name-screen img { width: min(260px, 45vw); mix-blend-mode: screen; margin-bottom: 8px; display: block; flex-shrink: 0; }
    #name-screen h2 { font-family: 'Nunito', sans-serif; font-size: clamp(24px, 5vw, 38px); color: #fff; margin-bottom: 6px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 0 30px rgba(255,255,255,0.3); text-align: center; flex-shrink: 0; }
    #name-screen .subtitle { font-size: clamp(11px, 2vw, 13px); color: rgba(255,255,255,0.6); margin-bottom: 24px; text-align: center; letter-spacing: 1px; flex-shrink: 0; }
    .field-label { font-size: 11px; color: rgba(255,255,255,0.85); letter-spacing: 1px; text-transform: lowercase; margin-bottom: 6px; width: 100%; max-width: 380px; text-align: left; flex-shrink: 0; }
    #name-input, #code-input { width: 100%; max-width: 380px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 16px; padding: 13px 18px; color: #fff; font-size: 15px; outline: none; -webkit-appearance: none; margin-bottom: 14px; flex-shrink: 0; }
    #name-input::-webkit-input-placeholder, #code-input::-webkit-input-placeholder { color: rgba(255,255,255,0.4); }
    #name-input:focus, #code-input:focus { border-color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.25); }
    #join-btn { width: min(260px, 80vw); background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.5); border-radius: 16px; padding: 14px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; -webkit-appearance: none; letter-spacing: 2px; margin-bottom: 10px; margin-top: 4px; flex-shrink: 0; }
    #join-btn:active { background: rgba(255,255,255,0.38); }
    .footnote { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 16px; text-align: center; letter-spacing: 1px; flex-shrink: 0; }
    .footnote a { color: rgba(255,255,255,0.85); text-decoration: underline; }

    /* CHAT SCREEN */
    #app { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; max-width: 600px; margin: 0 auto; z-index: 1; }

    #header { padding: 12px 16px 6px; text-align: center; -webkit-flex-shrink: 0; flex-shrink: 0; position: relative; }
    #leave-btn {
      position: absolute; left: 14px; top: 50%; -webkit-transform: translateY(-50%); transform: translateY(-50%);
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35);
      border-radius: 12px; color: #fff; font-size: 18px; cursor: pointer;
      padding: 6px 10px; -webkit-appearance: none; line-height: 1;
    }
    #leave-btn:active { background: rgba(255,255,255,0.35); }
    #header h1 { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 1px; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
    #status { font-size: 11px; margin-top: 3px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
    #status.connected { color: rgba(255,255,255,0.95); }
    #status.disconnected { color: rgba(255,255,255,0.4); }
    #presence { font-size: 11px; margin-top: 2px; letter-spacing: 1px; color: rgba(255,255,255,0.45); }
    #presence.active { color: rgba(255,255,255,0.9); }

    #messages { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; overflow-y: auto; padding: 8px 20px; -webkit-overflow-scrolling: touch; }

    .message { margin-bottom: 14px; max-width: 78%; word-wrap: break-word; position: relative; }
    .message.sent { margin-left: auto; text-align: right; }
    .message.received { margin-right: auto; text-align: left; }
    .message:before { content: '✦'; position: absolute; font-size: 8px; color: rgba(255,255,255,0.6); top: -4px; }
    .message.sent:before { right: 0px; }
    .message.received:before { left: 0px; }
    .message:after { content: '✧'; position: absolute; font-size: 6px; color: rgba(255,255,255,0.35); bottom: 8px; }
    .message.sent:after { right: -12px; }
    .message.received:after { left: -12px; }

    .bubble { display: inline-block; padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; color: #fff; }
    .sent .bubble { background: rgba(255,255,255,0.38); border: 1px solid rgba(255,255,255,0.5); border-bottom-right-radius: 5px; }
    .received .bubble { background: rgba(255,255,255,0.28); border: 1px solid rgba(255,255,255,0.38); border-bottom-left-radius: 5px; }
    .bubble strong { font-size: 11px; opacity: 0.7; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 2px; }
    .message .time { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 4px; letter-spacing: 0.5px; }

    .system-msg { text-align: center; font-size: 11px; color: rgba(255,255,255,0.45); margin: 6px 0; letter-spacing: 1px; }
    .system-msg:before { content: '✦ '; }
    .system-msg:after { content: ' ✦'; }

    #input-area { padding: 10px 14px 16px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-flex-shrink: 0; flex-shrink: 0; gap: 10px; }
    #msg-input { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35); border-radius: 24px; padding: 11px 18px; color: #fff; font-size: 15px; outline: none; -webkit-appearance: none; }
    #msg-input::-webkit-input-placeholder { color: rgba(255,255,255,0.5); }
    #send-btn { background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; width: 42px; height: 42px; color: #fff; font-size: 16px; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; -webkit-appearance: none; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; }
    #send-btn:active { background: rgba(255,255,255,0.45); }
  </style>
</head>
<body>
  <div id="stars"></div>

  <div id="name-screen">
    <img src="bunny.jpg" alt="">
    <h2>bunnychat 🐰💬</h2>
    <div class="subtitle">end-to-end decrypted &nbsp;|&nbsp; no logs</div>
    <div class="field-label">your name</div>
    <input type="text" id="name-input" placeholder="enter your name" maxlength="20">
    <div class="field-label">bunny pass 🔑</div>
    <input type="text" id="code-input" placeholder="enter or make your secret code" maxlength="40">
    <p style="font-size:10px;color:rgba(255,255,255,0.45);max-width:380px;text-align:center;margin-top:-8px;margin-bottom:8px;letter-spacing:0.5px;">same code = same garden | share it with your bunny 🐇</p>
    <button id="join-btn">✦ enter ✦</button>
    <p class="footnote">like <a href="https://en.wikipedia.org/wiki/Crypto_AG" target="_blank">Crypto AG</a>, but for bunnies <span style="margin:0 8px;color:rgba(255,255,255,0.9);">✦</span> <a href="how-to.html">how to bunny</a></p>
  </div>

  <div id="app">
    <div id="header">
      <button id="leave-btn" onclick="leaveChat()" title="leave chat">🚪</button>
      <h1>✦ bunnychat 🐰💬 ✦</h1>
      <div id="status" class="disconnected">connecting...</div>
      <div id="presence"></div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="say hi!">
      <button id="send-btn">✦</button>
    </div>
  </div>

  <script>
    var WS_URL = 'wss://chat-backend-2ri0.onrender.com';

    var starData = [
      [5,8],[12,22],[20,5],[28,40],[35,15],[42,60],[50,30],[58,10],[65,50],[72,25],
      [80,70],[88,35],[95,12],[8,55],[18,80],[30,65],[45,85],[60,75],[75,90],[90,55],
      [15,45],[25,20],[38,90],[55,5],[70,40],[85,20],[3,70],[22,35],[48,55],[78,15],
      [7,33],[17,67],[33,12],[47,77],[63,22],[77,58],[91,40],[4,90],[24,50],[53,38],
      [10,15],[40,25],[60,85],[85,65],[50,50],[30,80],[70,10],[90,30],[20,60],[45,5]
    ];
    var sc = document.getElementById('stars');
    for (var i = 0; i < starData.length; i++) {
      var s = document.createElement('span');
      s.className = 'star';
      s.textContent = i % 3 === 0 ? '✦' : i % 3 === 1 ? '·' : '✧';
      s.style.left = starData[i][0] + '%';
      s.style.top = starData[i][1] + '%';
      s.style.fontSize = (7 + (i % 6)) + 'px';
      s.style.animationDelay = (i * 0.12) + 's';
      s.style.animationDuration = (1.5 + (i % 3)) + 's';
      sc.appendChild(s);
    }

    var userName = '';
    var roomCode = '';
    var ws = null;
    var hasJoined = false;
    var isConnecting = false;
    var lastPresenceCount = null;
    var notifPermission = false;
    var messagesDiv = document.getElementById('messages');
    var statusDiv = document.getElementById('status');
    var presenceDiv = document.getElementById('presence');
    var msgInput = document.getElementById('msg-input');

    function requestNotifPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission(function(perm) { notifPermission = perm === 'granted'; });
      } else if ('Notification' in window && Notification.permission === 'granted') {
        notifPermission = true;
      }
    }

    function sendNotif(name) {
      if (!notifPermission || document.hasFocus()) return;
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('bunnychat 🐰💬', { body: name + ' sent you a message', icon: 'https://bunnychat.netlify.app/preview.png' });
      }
    }

    function saveSession(name, code) {
      try { localStorage.setItem('bunnychat_session', JSON.stringify({ name: name, code: code })); } catch(e) {}
    }

    function clearSession() {
      try { localStorage.removeItem('bunnychat_session'); } catch(e) {}
    }

    function showChat() {
      document.getElementById('name-screen').style.display = 'none';
    }

    function showHome() {
      document.getElementById('name-screen').style.display = 'flex';
    }

    function enterChat(name, code) {
      userName = name;
      roomCode = code;
      saveSession(name, code);
      showChat();
      requestNotifPermission();
      connectWebSocket();
    }

    function leaveChat() {
      clearSession();
      if (ws) { ws.close(); ws = null; }
      hasJoined = false;
      isConnecting = false;
      lastPresenceCount = null;
      messagesDiv.innerHTML = '';
      document.getElementById('name-input').value = '';
      document.getElementById('code-input').value = '';
      showHome();
    }

    document.getElementById('join-btn').addEventListener('click', function() {
      var name = document.getElementById('name-input').value.trim();
      var code = document.getElementById('code-input').value.trim();
      if (!name) { alert('please enter your name'); return; }
      if (!code) { alert('please enter your bunny pass'); return; }
      enterChat(name, code);
    });

    document.getElementById('name-input').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) document.getElementById('code-input').focus();
    });
    document.getElementById('code-input').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) document.getElementById('join-btn').click();
    });

    function connectWebSocket() {
      if (isConnecting) return;
      isConnecting = true;
      ws = new WebSocket(WS_URL);
      ws.onopen = function() {
        isConnecting = false;
        statusDiv.textContent = '✦ connected as ' + userName;
        statusDiv.className = 'connected';
        ws.send(JSON.stringify({ type: 'join', name: userName, code: roomCode }));
        if (!hasJoined) {
          addSystemMessage('you hopped in');
          hasJoined = true;
        }
      };
      ws.onmessage = function(event) {
        var data = JSON.parse(event.data);
        if (data.type === 'message') {
          addMessage(data.name, data.text, false);
          sendNotif(data.name);
        } else if (data.type === 'presence') {
          updatePresence(data.count);
        } else if (data.type === 'system') {
          addSystemMessage(data.text);
        }
      };
      ws.onclose = function() {
        isConnecting = false;
        statusDiv.textContent = 'disconnected...';
        statusDiv.className = 'disconnected';
        presenceDiv.textContent = '';
        presenceDiv.className = '';
        // Only reconnect if session still exists (user hasn't explicitly left)
        try {
          if (localStorage.getItem('bunnychat_session')) {
            setTimeout(connectWebSocket, 3000);
          }
        } catch(e) { setTimeout(connectWebSocket, 3000); }
      };
      ws.onerror = function() {
        isConnecting = false;
        statusDiv.textContent = 'uh oh... connection lost!';
        statusDiv.className = 'disconnected';
      };
    }

    function updatePresence(count) {
  if (count >= 2) {
    presenceDiv.textContent = '✦ somebunny is here';
    presenceDiv.className = 'active';
  } else if (lastPresenceCount !== null && lastPresenceCount >= 2) {
    presenceDiv.textContent = '';
    presenceDiv.className = '';
  } else {
    presenceDiv.textContent = 'nobunny is here yet...';
    presenceDiv.className = '';
  }
  lastPresenceCount = count;
}

    function sendMessage() {
      var text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'message', text: text }));
      addMessage(userName, text, true);
      msgInput.value = '';
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', function(e) { if (e.keyCode === 13) sendMessage(); });

    function addMessage(name, text, isSent) {
      var now = new Date();
      var time = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
      var div = document.createElement('div');
      div.className = 'message ' + (isSent ? 'sent' : 'received');
      div.innerHTML =
        '<div class="bubble">' +
          (isSent ? '' : '<strong>' + escapeHtml(name) + '</strong>') +
          escapeHtml(text) +
        '</div>' +
        '<div class="time">' + time + '</div>';
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addSystemMessage(text) {
      var div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // On load — auto-rejoin if session exists
    try {
      var saved = JSON.parse(localStorage.getItem('bunnychat_session'));
      if (saved && saved.name && saved.code) {
        document.getElementById('name-input').value = saved.name;
        document.getElementById('code-input').value = saved.code;
        enterChat(saved.name, saved.code);
      }
    } catch(e) {}
  </script>
</body>
</html>
