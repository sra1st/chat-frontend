<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🐰💬</title>
  <meta property="og:title" content="bunnychat 🐰💬">
  <meta property="og:description" content="for paranoid bunnies to discuss their secret carrot stash">
  <meta property="og:url" content="https://bunnychat.netlify.app">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://bunnychat.netlify.app/preview.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #c97ee8; color: #fff; }

    #stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; color: rgba(255,255,255,0.95); -webkit-animation: twinkle 2s infinite; animation: twinkle 2s infinite; }
    @-webkit-keyframes twinkle { 0%,100%{opacity:0.08;-webkit-transform:scale(0.7)} 50%{opacity:1;-webkit-transform:scale(1.6)} }
    @keyframes twinkle { 0%,100%{opacity:0.08;transform:scale(0.7)} 50%{opacity:1;transform:scale(1.6)} }

    /* HOME SCREEN */
    #name-screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #c97ee8;
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 32px 24px; z-index: 100;
    }
    #name-screen img { width: min(260px, 45vw); mix-blend-mode: screen; margin-bottom: 8px; display: block; flex-shrink: 0; }
    #name-screen h2 { font-family: 'Nunito', sans-serif; font-size: clamp(24px, 5vw, 38px); color: #fff; margin-bottom: 6px; font-weight: 800; letter-spacing: 1px; text-shadow: 0 0 30px rgba(255,255,255,0.3); text-align: center; flex-shrink: 0; }
    #name-screen .subtitle { font-size: clamp(11px, 2vw, 13px); color: rgba(255,255,255,0.6); margin-bottom: 24px; text-align: center; letter-spacing: 1px; flex-shrink: 0; }
    .field-label { font-size: 11px; color: rgba(255,255,255,0.85); letter-spacing: 1px; text-transform: lowercase; margin-bottom: 6px; width: 100%; max-width: 380px; text-align: left; flex-shrink: 0; }
    #name-input, #code-input { width: 100%; max-width: 380px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 16px; padding: 13px 18px; color: #fff; font-size: 15px; outline: none; -webkit-appearance: none; margin-bottom: 14px; flex-shrink: 0; }
    #name-input::-webkit-input-placeholder, #code-input::-webkit-input-placeholder { color: rgba(255,255,255,0.4); }
    #name-input:focus, #code-input:focus { border-color: rgba(255,255,255,0.75); background: rgba(255,255,255,0.25); }
    #join-btn { width: min(260px, 80vw); background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.5); border-radius: 16px; padding: 14px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; -webkit-appearance: none; letter-spacing: 2px; margin-bottom: 10px; margin-top: 4px; flex-shrink: 0; }
    #join-btn:active { background: rgba(255,255,255,0.38); }
    .footnote { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 16px; text-align: center; letter-spacing: 1px; flex-shrink: 0; }
    .footnote a { color: rgba(255,255,255,0.85); text-decoration: underline; }

    /* CHAT SCREEN */
    #app { position: fixed; top: 0; left: 0; right: 0; bottom: 0; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; max-width: 600px; margin: 0 auto; z-index: 1; }

    #header { padding: 12px 16px 6px; text-align: center; -webkit-flex-shrink: 0; flex-shrink: 0; position: relative; }
    #leave-btn {
      position: absolute; left: 14px; top: 50%; -webkit-transform: translateY(-50%); transform: translateY(-50%);
      display: -webkit-box; display: -webkit-flex; display: flex;
      -webkit-box-align: center; -webkit-align-items: center; align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      color: #fff;
      cursor: pointer;
      padding: 8px 14px 8px 11px;
      -webkit-appearance: none;
      line-height: 1;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.4px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }
    #leave-btn:hover { background: rgba(255,255,255,0.24); box-shadow: 0 8px 22px rgba(0,0,0,0.14); transform: translateY(-50%) scale(1.02); }
    #leave-btn:active { background: rgba(255,255,255,0.32); transform: translateY(-50%) scale(0.98); }
    #leave-btn .leave-icon { font-size: 17px; line-height: 1; }
    #leave-btn .leave-label { display: inline-block; }
    @media (max-width: 640px) {
      #leave-btn {
        left: 12px;
        padding: 10px;
        width: 44px;
        height: 44px;
        -webkit-box-pack: center;
        -webkit-justify-content: center;
        justify-content: center;
      }
      #leave-btn .leave-label { display: none; }
      #leave-btn .leave-icon { font-size: 18px; }
    }
    #header h1 { font-family: 'Nunito', sans-serif; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 1px; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
    #status { font-size: 11px; margin-top: 3px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
    #status.connected { color: rgba(255,255,255,0.95); }
    #status.disconnected { color: rgba(255,255,255,0.4); }
    #presence { font-size: 11px; margin-top: 2px; letter-spacing: 1px; color: rgba(255,255,255,0.45); }
    #presence.active { color: rgba(255,255,255,0.9); }

    #messages { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; overflow-y: auto; padding: 8px 20px; -webkit-overflow-scrolling: touch; position: relative; z-index: 1; }

    .message { margin-bottom: 14px; max-width: 78%; word-wrap: break-word; position: relative; }
    .message.sent { margin-left: auto; text-align: right; }
    .message.received { margin-right: auto; text-align: left; }
    .message:before { content: '✦'; position: absolute; font-size: 8px; color: rgba(255,255,255,0.6); top: -4px; }
    .message.sent:before { right: 0px; }
    .message.received:before { left: 0px; }
    .message:after { content: '✧'; position: absolute; font-size: 6px; color: rgba(255,255,255,0.35); bottom: 8px; }
    .message.sent:after { right: -12px; }
    .message.received:after { left: -12px; }

    .bubble { display: inline-block; padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; color: #fff; }
    .sent .bubble { background: rgba(96, 41, 138, 0.92); border: 1px solid rgba(255,255,255,0.18); border-bottom-right-radius: 5px; box-shadow: 0 10px 22px rgba(53, 9, 82, 0.22); }
    .received .bubble { background: rgba(70, 22, 103, 0.92); border: 1px solid rgba(255,255,255,0.18); border-bottom-left-radius: 5px; box-shadow: 0 10px 22px rgba(53, 9, 82, 0.22); }
    .bubble strong { font-size: 11px; opacity: 0.7; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 2px; }
    .message .time { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 4px; letter-spacing: 0.5px; }

    .system-msg { text-align: center; font-size: 11px; color: rgba(255,255,255,0.45); margin: 6px 0; letter-spacing: 1px; }
    .system-msg:before { content: '✦ '; }
    .system-msg:after { content: ' ✦'; }


    #typing { min-height: 16px; padding: 0 18px 4px; text-align: center; font-size: 11px; color: rgba(255,255,255,0.72); letter-spacing: 0.7px; }
    #reply-preview {
      display: none;
      margin: 0 14px 6px;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 16px;
      background: rgba(74, 24, 109, 0.92);
      box-shadow: 0 10px 20px rgba(53, 9, 82, 0.18);
      color: #fff;
    }
    #reply-preview .replying-to {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.75;
      margin-bottom: 4px;
    }
    #reply-preview .reply-snippet {
      font-size: 12px;
      line-height: 1.4;
      opacity: 0.96;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #reply-preview .reply-actions {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    #reply-preview .cancel-reply {
      margin-left: auto;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.16);
      color: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      -webkit-appearance: none;
    }

    .message .bubble-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
    }
    .message .reply-btn {
      position: absolute;
      top: -6px;
      right: -8px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(74, 24, 109, 0.95);
      color: #fff;
      border-radius: 999px;
      width: 26px;
      height: 26px;
      font-size: 12px;
      cursor: pointer;
      opacity: 0;
      -webkit-appearance: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .message:hover .reply-btn, .message:focus-within .reply-btn { opacity: 1; transform: scale(1.02); }
    .message.sent .reply-btn { right: auto; left: -8px; }
    .message .reply-btn:active { transform: scale(0.96); }
    .reply-quote {
      border-left: 2px solid rgba(255,255,255,0.30);
      padding-left: 8px;
      margin-bottom: 6px;
      font-size: 11px;
      opacity: 0.82;
    }
    .reply-quote strong {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      margin-bottom: 2px;
      opacity: 0.85;
    }
    .message-meta {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      gap: 8px;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      margin-top: 4px;
      color: rgba(255,255,255,0.72);
      font-size: 10px;
      letter-spacing: 0.5px;
      justify-content: flex-end;
    }
    .message.received .message-meta { justify-content: flex-start; }
    .receipt {
      opacity: 0.9;
      text-transform: lowercase;
    }
    .typing-dot {
      display: inline-block;
      width: 4px;
      height: 4px;
      margin: 0 1px;
      border-radius: 50%;
      background: rgba(255,255,255,0.76);
      animation: typingPulse 1s infinite ease-in-out;
    }
    @keyframes typingPulse {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.45; }
      40% { transform: scale(1); opacity: 1; }
    }

    #input-area { padding: 10px 14px 16px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-flex-shrink: 0; flex-shrink: 0; gap: 10px; }
    #msg-input { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35); border-radius: 24px; padding: 11px 18px; color: #fff; font-size: 15px; outline: none; -webkit-appearance: none; }
    #msg-input::-webkit-input-placeholder { color: rgba(255,255,255,0.5); }
    #send-btn { background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; width: 42px; height: 42px; color: #fff; font-size: 16px; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; -webkit-appearance: none; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; }
    #send-btn:active { background: rgba(255,255,255,0.45); }
  </style>
</head>
<body>
  <div id="stars"></div>

  <div id="name-screen">
    <img src="bunny.jpg" alt="">
    <h2>bunnychat 🐰💬</h2>
    <div class="subtitle">end-to-end decrypted &nbsp;|&nbsp; no logs</div>
    <div class="field-label">your name</div>
    <input type="text" id="name-input" placeholder="enter your name" maxlength="20">
    <div class="field-label">bunny code 🔑</div>
    <input type="text" id="code-input" placeholder="enter or make your secret code" maxlength="40">
    <p style="font-size:10px;color:rgba(255,255,255,0.45);max-width:380px;text-align:center;margin-top:-8px;margin-bottom:8px;letter-spacing:0.5px;">same code = same garden | share it with your bunny 🐇</p>
    <button id="join-btn">✦ enter ✦</button>
    <p class="footnote">like <a href="https://en.wikipedia.org/wiki/Crypto_AG" target="_blank">Crypto AG</a>, but for bunnies <span style="margin:0 8px;color:rgba(255,255,255,0.9);">✦</span> <a href="how-to.html">how to bunny</a></p>
  </div>

  <div id="app">
    <div id="header">
      <button id="leave-btn" onclick="leaveChat()" title="hop off 🐇" aria-label="hop off 🐇"><span class="leave-icon">🚪</span><span class="leave-label">hop off 🐇</span></button>
      <h1>✦ bunnychat 🐰💬 ✦</h1>
      <div id="status" class="disconnected">connecting...</div>
      <div id="presence"></div>
    </div>
    <div id="messages"></div>
    <div id="reply-preview"></div>
    <div id="typing"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="say hi!">
      <button id="send-btn">✦</button>
    </div>
  </div>

  
<script>
    var WS_URL = 'wss://chat-backend-2ri0.onrender.com';

    var starData = [
      [5,8],[12,22],[20,5],[28,40],[35,15],[42,60],[50,30],[58,10],[65,50],[72,25],
      [80,70],[88,35],[95,12],[8,55],[18,80],[30,65],[45,85],[60,75],[75,90],[90,55],
      [15,45],[25,20],[38,90],[55,5],[70,40],[85,20],[3,70],[22,35],[48,55],[78,15],
      [7,33],[17,67],[33,12],[47,77],[63,22],[77,58],[91,40],[4,90],[24,50],[53,38],
      [10,15],[40,25],[60,85],[85,65],[50,50],[30,80],[70,10],[90,30],[20,60],[45,5]
    ];
    var sc = document.getElementById('stars');
    for (var i = 0; i < starData.length; i++) {
      var s = document.createElement('span');
      s.className = 'star';
      s.textContent = i % 3 === 0 ? '✦' : i % 3 === 1 ? '·' : '✧';
      s.style.left = starData[i][0] + '%';
      s.style.top = starData[i][1] + '%';
      s.style.fontSize = (7 + (i % 6)) + 'px';
      s.style.animationDelay = (i * 0.12) + 's';
      s.style.animationDuration = (1.5 + (i % 3)) + 's';
      sc.appendChild(s);
    }

    function goBack() {
      if (ws) { ws.close(); ws = null; }
      hasJoined = false;
      isConnecting = false;
      clearTypingState();
      clearReplyTarget();
      document.getElementById('messages').innerHTML = '';
      document.getElementById('name-screen').style.display = 'flex';
      document.getElementById('name-input').value = '';
      document.getElementById('code-input').value = '';
    }

    var userName = '';
    var roomCode = '';
    var ws = null;
    var hasJoined = false;
    var isConnecting = false;
    var lastPresenceCount = null;
    var notifPermission = false;
    var messagesDiv = document.getElementById('messages');
    var statusDiv = document.getElementById('status');
    var presenceDiv = document.getElementById('presence');
    var typingDiv = document.getElementById('typing');
    var replyPreviewDiv = document.getElementById('reply-preview');
    var msgInput = document.getElementById('msg-input');
    var messageHistory = [];
    var messageElements = {};
    var typingUsers = {};
    var typingTimer = null;
    var typingClearTimer = null;
    var replyTarget = null;

    function requestNotifPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission(function(perm) { notifPermission = perm === 'granted'; });
      } else if ('Notification' in window && Notification.permission === 'granted') {
        notifPermission = true;
      }
    }

    function sendBodyNotif(body) {
      if (!notifPermission || document.hasFocus()) return;
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('bunnychat 🐰💬', { body: body, icon: 'https://bunnychat.netlify.app/preview.png' });
      }
    }

    function sendNotif(name) {
      sendBodyNotif(name + ' sent you a message');
    }

    function saveSession(name, code) {
      try { localStorage.setItem('bunnychat_session', JSON.stringify({ name: name, code: code })); } catch(e) {}
    }

    function clearSession() {
      try { localStorage.removeItem('bunnychat_session'); } catch(e) {}
    }

    function showChat() {
      document.getElementById('name-screen').style.display = 'none';
    }

    function showHome() {
      document.getElementById('name-screen').style.display = 'flex';
    }

    function historyKey() {
      return 'bunnychat_history_' + roomCode;
    }

    function loadHistory() {
      try {
        var raw = localStorage.getItem(historyKey());
        return raw ? JSON.parse(raw) : [];
      } catch(e) {
        return [];
      }
    }

    function saveHistory() {
      try { localStorage.setItem(historyKey(), JSON.stringify(messageHistory)); } catch(e) {}
    }

    function clearHistory() {
      messageHistory = [];
      messageElements = {};
      try { localStorage.removeItem(historyKey()); } catch(e) {}
    }

    function formatTime(timeValue) {
      var date = timeValue ? new Date(timeValue) : new Date();
      if (isNaN(date.getTime())) date = new Date();
      var hours = date.getHours();
      var minutes = date.getMinutes();
      return hours + ':' + (minutes < 10 ? '0' : '') + minutes;
    }

    function renderHistory() {
      messagesDiv.innerHTML = '';
      messageElements = {};
      for (var i = 0; i < messageHistory.length; i++) {
        var item = messageHistory[i];
        if (item.type === 'message' || (!item.type && item.id)) {
          addMessage(item, false);
        } else if (item.type === 'system') {
          addSystemMessage(item.text, false);
        }
      }
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      updateTypingIndicator();
      renderReplyPreview();
    }

    function enterChat(name, code) {
      userName = name;
      roomCode = code;
      saveSession(name, code);
      messageHistory = loadHistory();
      showChat();
      renderHistory();
      requestNotifPermission();
      connectWebSocket();
    }

    function leaveChat() {
      clearSession();
      clearHistory();
      if (ws && ws.readyState === 1) {
        try { ws.send(JSON.stringify({ type: 'leave' })); } catch(e) {}
      }
      if (ws) { ws.close(); ws = null; }
      hasJoined = false;
      isConnecting = false;
      lastPresenceCount = null;
      clearTypingState();
      clearReplyTarget();
      messagesDiv.innerHTML = '';
      document.getElementById('name-input').value = '';
      document.getElementById('code-input').value = '';
      showHome();
    }

    document.getElementById('join-btn').addEventListener('click', function() {
      var name = document.getElementById('name-input').value.trim();
      var code = document.getElementById('code-input').value.trim();
      if (!name) { alert('please enter your name'); return; }
      if (!code) { alert('please enter your bunny code'); return; }
      enterChat(name, code);
    });

    document.getElementById('name-input').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) document.getElementById('code-input').focus();
    });
    document.getElementById('code-input').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) document.getElementById('join-btn').click();
    });

    function connectWebSocket() {
      if (isConnecting) return;
      isConnecting = true;
      ws = new WebSocket(WS_URL);
      ws.onopen = function() {
        isConnecting = false;
        statusDiv.textContent = '✦ connected as ' + userName;
        statusDiv.className = 'connected';
        ws.send(JSON.stringify({ type: 'join', name: userName, code: roomCode }));
        if (!hasJoined) {
          addSystemMessage('you hopped in', false);
          hasJoined = true;
        }
      };
      ws.onmessage = function(event) {
        var data = JSON.parse(event.data);
        if (data.type === 'message') {
          addMessage({
            id: data.id,
            name: data.name,
            text: data.text,
            time: data.time,
            replyTo: data.replyTo || null,
            isSent: data.name === userName,
            readState: data.readState || 'sent'
          }, true);
          if (data.name !== userName) {
            sendNotif(data.name);
            acknowledgeRead(data.id);
          }
        } else if (data.type === 'presence') {
          updatePresence(data.count);
        } else if (data.type === 'left') {
          var leftText = data.name + ' hopped away 🐇';
          addSystemMessage(leftText);
          sendBodyNotif(leftText);
          delete typingUsers[data.name];
          updateTypingIndicator();
        } else if (data.type === 'system') {
          addSystemMessage(data.text);
          if (data.text && data.text.indexOf('hopped away') !== -1) {
            sendBodyNotif(data.text);
          }
        } else if (data.type === 'typing') {
          if (data.name && data.name !== userName) {
            if (data.isTyping) {
              typingUsers[data.name] = true;
            } else {
              delete typingUsers[data.name];
            }
            updateTypingIndicator();
          }
        } else if (data.type === 'read') {
          markMessageRead(data.id, data.by);
        }
      };
      ws.onclose = function() {
        isConnecting = false;
        statusDiv.textContent = 'disconnected...';
        statusDiv.className = 'disconnected';
        presenceDiv.textContent = '';
        presenceDiv.className = '';
        clearTypingState();
        // Only reconnect if session still exists (user hasn't explicitly left)
        try {
          if (localStorage.getItem('bunnychat_session')) {
            setTimeout(connectWebSocket, 3000);
          }
        } catch(e) { setTimeout(connectWebSocket, 3000); }
      };
      ws.onerror = function() {
        isConnecting = false;
        statusDiv.textContent = 'uh oh... connection lost!';
        statusDiv.className = 'disconnected';
      };
    }

    function updatePresence(count) {
      if (count >= 2) {
        presenceDiv.textContent = '✦ somebunny is here';
        presenceDiv.className = 'active';
      } else if (lastPresenceCount !== null && lastPresenceCount >= 2) {
        presenceDiv.textContent = '';
        presenceDiv.className = '';
      } else {
        presenceDiv.textContent = 'nobunny is here yet...';
        presenceDiv.className = '';
      }
      lastPresenceCount = count;
    }

    function clearTypingState() {
      typingUsers = {};
      updateTypingIndicator();
      if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
      if (typingClearTimer) { clearTimeout(typingClearTimer); typingClearTimer = null; }
      if (ws && ws.readyState === 1) {
        try { ws.send(JSON.stringify({ type: 'typing', isTyping: false })); } catch(e) {}
      }
    }

    function updateTypingIndicator() {
      var names = [];
      for (var key in typingUsers) {
        if (typingUsers.hasOwnProperty(key) && typingUsers[key]) names.push(key);
      }
      if (!names.length) {
        typingDiv.textContent = '';
        return;
      }
      if (names.length === 1) {
        typingDiv.textContent = names[0] + ' is typing...';
      } else if (names.length === 2) {
        typingDiv.textContent = names[0] + ' and ' + names[1] + ' are typing...';
      } else {
        typingDiv.textContent = 'somebunny is typing...';
      }
    }

    function sendTypingState(isTyping) {
      if (!ws || ws.readyState !== 1) return;
      try { ws.send(JSON.stringify({ type: 'typing', isTyping: !!isTyping })); } catch(e) {}
    }

    function scheduleTypingStop() {
      if (typingTimer) clearTimeout(typingTimer);
      typingTimer = setTimeout(function() {
        typingTimer = null;
        sendTypingState(false);
      }, 1200);
    }

    function setReplyTarget(item) {
      replyTarget = {
        id: item.id || '',
        name: item.name || '',
        text: item.text || '',
        time: item.time || ''
      };
      renderReplyPreview();
    }

    function clearReplyTarget() {
      replyTarget = null;
      renderReplyPreview();
    }

    function renderReplyPreview() {
      if (!replyTarget) {
        replyPreviewDiv.style.display = 'none';
        replyPreviewDiv.innerHTML = '';
        return;
      }
      replyPreviewDiv.style.display = 'block';
      replyPreviewDiv.innerHTML =
        '<div class="replying-to">replying to ' + escapeHtml(replyTarget.name || 'somebunny') + '</div>' +
        '<div class="reply-snippet">' + escapeHtml(replyTarget.text || '') + '</div>' +
        '<div class="reply-actions"><button type="button" class="cancel-reply">cancel</button></div>';
      var cancel = replyPreviewDiv.querySelector('.cancel-reply');
      if (cancel) {
        cancel.addEventListener('click', clearReplyTarget);
      }
    }

    function acknowledgeRead(id) {
      if (!id || !ws || ws.readyState !== 1) return;
      try { ws.send(JSON.stringify({ type: 'read', id: id })); } catch(e) {}
    }

    function markMessageRead(id, by) {
      if (!id) return;
      for (var i = 0; i < messageHistory.length; i++) {
        var item = messageHistory[i];
        if ((item.type === 'message' || !item.type) && item.id === id) {
          item.readState = 'read';
          if (!item.readBy) item.readBy = [];
          if (by && item.readBy.indexOf(by) === -1) item.readBy.push(by);
          break;
        }
      }
      var entry = messageElements[id];
      if (entry) {
        var receipt = entry.querySelector('.receipt');
        if (receipt) receipt.textContent = 'read';
      }
      saveHistory();
    }

    function sendMessage() {
      var text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      var id = 'm_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      var time = new Date().toISOString();
      var replyTo = replyTarget ? {
        id: replyTarget.id,
        name: replyTarget.name,
        text: replyTarget.text,
        time: replyTarget.time
      } : null;
      var payload = { type: 'message', id: id, text: text, time: time, replyTo: replyTo };
      ws.send(JSON.stringify(payload));
      addMessage({
        id: id,
        name: userName,
        text: text,
        time: time,
        replyTo: replyTo,
        isSent: true,
        readState: 'sent'
      }, true);
      msgInput.value = '';
      sendTypingState(false);
      if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
      clearReplyTarget();
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', function(e) { if (e.keyCode === 13) sendMessage(); });
    msgInput.addEventListener('input', function() {
      var hasText = msgInput.value.trim().length > 0;
      if (hasText) {
        sendTypingState(true);
        scheduleTypingStop();
      } else {
        sendTypingState(false);
        if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
      }
    });
    msgInput.addEventListener('blur', function() {
      sendTypingState(false);
      if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
    });

    function addMessage(item, shouldPersist) {
      if (shouldPersist === undefined) shouldPersist = true;
      var div = document.createElement('div');
      div.className = 'message ' + (item.isSent ? 'sent' : 'received');
      if (item.id) {
        messageElements[item.id] = div;
      }
      var replyMarkup = '';
      if (item.replyTo && item.replyTo.text) {
        replyMarkup =
          '<div class="reply-quote">' +
            '<strong>' + escapeHtml(item.replyTo.name || 'reply') + '</strong>' +
            '<div>' + escapeHtml(item.replyTo.text) + '</div>' +
          '</div>';
      }
      div.innerHTML =
        '<div class="bubble-wrap">' +
          '<button type="button" class="reply-btn" aria-label="reply">↩</button>' +
          '<div class="bubble">' +
            replyMarkup +
            escapeHtml(item.text) +
          '</div>' +
        '</div>' +
        '<div class="message-meta">' +
          '<span class="time">' + formatTime(item.time) + '</span>' +
          (item.isSent ? '<span class="receipt">' + escapeHtml(item.readState || 'sent') + '</span>' : '') +
        '</div>';
      var replyBtn = div.querySelector('.reply-btn');
      if (replyBtn) {
        replyBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          setReplyTarget(item);
        });
      }
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      if (shouldPersist) {
        // Always stamp type so renderHistory can match it on reload
        var storeItem = {};
        for (var k in item) { if (item.hasOwnProperty(k)) storeItem[k] = item[k]; }
        storeItem.type = 'message';
        var existingIndex = -1;
        for (var j = 0; j < messageHistory.length; j++) {
          var h = messageHistory[j];
          if ((h.type === 'message' || !h.type) && h.id && h.id === item.id) {
            existingIndex = j;
            break;
          }
        }
        if (existingIndex >= 0) {
          messageHistory[existingIndex] = storeItem;
        } else {
          messageHistory.push(storeItem);
        }
        saveHistory();
      }
    }

    function addSystemMessage(text, shouldPersist) {
      if (shouldPersist === undefined) shouldPersist = true;
      var div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      if (shouldPersist) {
        messageHistory.push({ type: 'system', text: text });
        saveHistory();
      }
    }

    function escapeHtml(text) {
      return String(text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // On load — auto-rejoin if session exists
    try {
      var saved = JSON.parse(localStorage.getItem('bunnychat_session'));
      if (saved && saved.name && saved.code) {
        document.getElementById('name-input').value = saved.name;
        document.getElementById('code-input').value = saved.code;
        enterChat(saved.name, saved.code);
      }
    } catch(e) {}
  </script>
</body>
