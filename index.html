<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✦ Chat</title>
  <style>
    * { margin: 0; padding: 0; -webkit-box-sizing: border-box; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #c97ee8; color: #fff; }

    #stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; color: rgba(255,255,255,0.5); -webkit-animation: twinkle 3s infinite; animation: twinkle 3s infinite; }
    @-webkit-keyframes twinkle { 0%,100%{opacity:0.2;-webkit-transform:scale(1)} 50%{opacity:0.8;-webkit-transform:scale(1.3)} }
    @keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.3)} }

    #app { position: relative; z-index: 1; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; height: 100%; max-width: 600px; margin: 0 auto; }

    #header { padding: 16px; text-align: center; -webkit-flex-shrink: 0; flex-shrink: 0; }
    #header h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 3px; text-shadow: 0 0 20px rgba(255,255,255,0.4); }
    #status { font-size: 11px; margin-top: 3px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
    #status.connected { color: rgba(255,255,255,0.95); }
    #status.disconnected { color: rgba(255,255,255,0.4); }

    #messages { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; overflow-y: auto; padding: 12px 20px; -webkit-overflow-scrolling: touch; }

    .message { margin-bottom: 14px; max-width: 78%; word-wrap: break-word; position: relative; }
    .message.sent { margin-left: auto; text-align: right; }
    .message.received { margin-right: auto; text-align: left; }

    .message:before { content: '✦'; position: absolute; font-size: 8px; color: rgba(255,255,255,0.6); top: -4px; }
    .message.sent:before { right: 0px; }
    .message.received:before { left: 0px; }
    .message:after { content: '✧'; position: absolute; font-size: 6px; color: rgba(255,255,255,0.35); bottom: 8px; }
    .message.sent:after { right: -12px; }
    .message.received:after { left: -12px; }

    .bubble { display: inline-block; padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; color: #fff; }
    .sent .bubble { background: rgba(255,255,255,0.38); border: 1px solid rgba(255,255,255,0.5); border-bottom-right-radius: 5px; }
    .received .bubble { background: rgba(255,255,255,0.28); border: 1px solid rgba(255,255,255,0.38); border-bottom-left-radius: 5px; }
    .bubble strong { font-size: 11px; opacity: 0.7; letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 2px; }

    .message .time { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 4px; letter-spacing: 0.5px; }

    .system-msg { text-align: center; font-size: 11px; color: rgba(255,255,255,0.45); margin: 10px 0; letter-spacing: 1px; }
    .system-msg:before { content: '✦ '; }
    .system-msg:after { content: ' ✦'; }

    #input-area { padding: 10px 14px 16px; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-flex-shrink: 0; flex-shrink: 0; gap: 10px; }
    #msg-input { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35); border-radius: 24px; padding: 11px 18px; color: #fff; font-size: 15px; outline: none; -webkit-appearance: none; }
    #msg-input::-webkit-input-placeholder { color: rgba(255,255,255,0.5); }
    #send-btn { background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; width: 42px; height: 42px; color: #fff; font-size: 16px; cursor: pointer; -webkit-flex-shrink: 0; flex-shrink: 0; -webkit-appearance: none; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; }
    #send-btn:active { background: rgba(255,255,255,0.45); }

    #name-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #c97ee8; display: -webkit-box; display: -webkit-flex; display: flex; -webkit-box-orient: vertical; -webkit-flex-direction: column; flex-direction: column; -webkit-box-align: center; -webkit-align-items: center; align-items: center; -webkit-box-pack: center; -webkit-justify-content: center; justify-content: center; padding: 32px; z-index: 100; }
    .stars-deco { font-size: 22px; letter-spacing: 10px; margin-bottom: 14px; color: rgba(255,255,255,0.65); }
    #name-screen h2 { font-size: 28px; color: #fff; margin-bottom: 6px; font-weight: 700; letter-spacing: 4px; text-shadow: 0 0 30px rgba(255,255,255,0.3); }
    #name-screen p { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 36px; text-align: center; letter-spacing: 1.5px; }
    #name-input { width: 100%; max-width: 280px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 16px; padding: 14px 18px; color: #fff; font-size: 16px; outline: none; -webkit-appearance: none; margin-bottom: 14px; text-align: center; }
    #name-input::-webkit-input-placeholder { color: rgba(255,255,255,0.5); }
    #name-input:focus { border-color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.25); }
    #join-btn { width: 100%; max-width: 280px; background: rgba(255,255,255,0.22); border: 1px solid rgba(255,255,255,0.5); border-radius: 16px; padding: 14px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; -webkit-appearance: none; letter-spacing: 3px; }
    #join-btn:active { background: rgba(255,255,255,0.38); }
  </style>
</head>
<body>

  <div id="stars"></div>

  <div id="name-screen">
    <div class="stars-deco">✦ ✧ ✦</div>
    <h2>bunny mail 🐰📬</h2>
    <p>end-to-end decrypted</p>
    <input type="text" id="name-input" placeholder="your name" maxlength="20">
    <button id="join-btn">✦ enter ✦</button>
    <p style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:24px;text-align:center;letter-spacing:1px;">like <a href="https://en.wikipedia.org/wiki/Crypto_AG" target="_blank" style="color:rgba(255,255,255,0.6);text-decoration:underline;">Crypto AG</a>, but for bunnies</p>
  </div>

  <div id="app">
    <div id="header">
      <h1>✦ bunny mail 🐰📬 ✦</h1>
      <div id="status" class="disconnected">connecting...</div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="msg-input" placeholder="say something...">
      <button id="send-btn">✦</button>
    </div>
  </div>

  <script>
    var WS_URL = 'wss://chat-backend-2ri0.onrender.com';

    var starData = [
      [5,8],[12,22],[20,5],[28,40],[35,15],[42,60],[50,30],[58,10],[65,50],[72,25],
      [80,70],[88,35],[95,12],[8,55],[18,80],[30,65],[45,85],[60,75],[75,90],[90,55],
      [15,45],[25,20],[38,90],[55,5],[70,40],[85,20],[3,70],[22,35],[48,55],[78,15]
    ];
    var sc = document.getElementById('stars');
    for (var i = 0; i < starData.length; i++) {
      var s = document.createElement('span');
      s.className = 'star';
      s.textContent = i % 3 === 0 ? '✦' : i % 3 === 1 ? '·' : '✧';
      s.style.left = starData[i][0] + '%';
      s.style.top = starData[i][1] + '%';
      s.style.fontSize = (7 + (i % 5)) + 'px';
      s.style.animationDelay = (i * 0.15) + 's';
      s.style.animationDuration = (2 + (i % 3)) + 's';
      sc.appendChild(s);
    }

    var userName = '';
    var ws = null;
    var messagesDiv = document.getElementById('messages');
    var statusDiv = document.getElementById('status');
    var msgInput = document.getElementById('msg-input');

    document.getElementById('join-btn').addEventListener('click', function() {
      var name = document.getElementById('name-input').value.trim();
      if (!name) { alert('please enter your name'); return; }
      userName = name;
      document.getElementById('name-screen').style.display = 'none';
      connectWebSocket();
    });

    document.getElementById('name-input').addEventListener('keydown', function(e) {
      if (e.keyCode === 13) document.getElementById('join-btn').click();
    });

    function connectWebSocket() {
      ws = new WebSocket(WS_URL);
      ws.onopen = function() {
        statusDiv.textContent = '✦ connected as ' + userName;
        statusDiv.className = 'connected';
        addSystemMessage('you joined');
      };
      ws.onmessage = function(event) {
        var data = JSON.parse(event.data);
        addMessage(data.name, data.text, false);
      };
      ws.onclose = function() {
        statusDiv.textContent = 'disconnected...';
        statusDiv.className = 'disconnected';
        addSystemMessage('connection lost — reconnecting');
        setTimeout(connectWebSocket, 3000);
      };
      ws.onerror = function() {
        statusDiv.textContent = 'connection error';
        statusDiv.className = 'disconnected';
      };
    }

    function sendMessage() {
      var text = msgInput.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ name: userName, text: text }));
      addMessage(userName, text, true);
      msgInput.value = '';
    }

    document.getElementById('send-btn').addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', function(e) { if (e.keyCode === 13) sendMessage(); });

    function addMessage(name, text, isSent) {
      var now = new Date();
      var time = now.getHours() + ':' + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
      var div = document.createElement('div');
      div.className = 'message ' + (isSent ? 'sent' : 'received');
      div.innerHTML =
        '<div class="bubble">' +
          (isSent ? '' : '<strong>' + escapeHtml(name) + '</strong>') +
          escapeHtml(text) +
        '</div>' +
        '<div class="time">' + time + '</div>';
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function addSystemMessage(text) {
      var div = document.createElement('div');
      div.className = 'system-msg';
      div.textContent = text;
      messagesDiv.appendChild(div);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
