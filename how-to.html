<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>sample convo — bunny chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body { font-family: 'Nunito', sans-serif; background: #c97ee8; color: #fff; }

    #stars { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .star { position: absolute; color: rgba(255,255,255,0.95); animation: twinkle 2s infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.05;transform:scale(0.7)} 50%{opacity:1;transform:scale(1.6)} }

    #wrap { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; padding: 36px 24px 60px; display: flex; flex-direction: column; align-items: center; }

    .back { font-size: 12px; color: rgba(255,255,255,0.6); letter-spacing: 1px; text-decoration: none; margin-bottom: 20px; align-self: flex-start; }

    h1 { font-size: 18px; letter-spacing: 3px; font-weight: 700; text-align: center; margin-bottom: 32px; text-shadow: 0 0 20px rgba(255,255,255,0.3); }

    /* Chat screen simulation as background behind image */
    .img-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      border-radius: 24px;
      overflow: hidden;
    }

    /* Purple chat background with stars behind the art */
    .img-wrap:before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #b565d8;
      z-index: 0;
    }

    .convo-img {
      position: relative;
      z-index: 1;
      width: 100%;
      display: block;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <div id="stars"></div>
  <div id="wrap">
    <a class="back" href="/">← back</a>
    <h1>✦ sample convo ✦</h1>
    <div class="img-wrap">
      <img class="convo-img" src="convo.png" alt="sample conversation">
    </div>
    <p style="font-size:11px;color:rgba(255,255,255,0.5);text-align:center;letter-spacing:1px;margin-top:32px;padding:0 24px;">remember to share your bunny pass with the other bunny so they can hop in with you 🐰</p>
  </div>

  <script>
    var starData = [
      [5,8],[12,22],[20,5],[28,40],[35,15],[42,60],[50,30],[58,10],[65,50],[72,25],
      [80,70],[88,35],[95,12],[8,55],[18,80],[30,65],[45,85],[60,75],[75,90],[90,55],
      [15,45],[25,20],[38,90],[55,5],[70,40],[85,20],[3,70],[22,35],[48,55],[78,15],
      [7,33],[17,67],[33,12],[47,77],[63,22],[77,58],[91,40],[4,90],[24,50],[53,38]
    ];
    var sc = document.getElementById('stars');
    for (var i = 0; i < starData.length; i++) {
      var s = document.createElement('span');
      s.className = 'star';
      s.textContent = i % 3 === 0 ? '✦' : i % 3 === 1 ? '·' : '✧';
      s.style.left = starData[i][0] + '%';
      s.style.top = starData[i][1] + '%';
      s.style.fontSize = (7 + (i % 6)) + 'px';
      s.style.animationDelay = (i * 0.12) + 's';
      s.style.animationDuration = (1.5 + (i % 3)) + 's';
      sc.appendChild(s);
    }
  </script>
</body>
</html>
